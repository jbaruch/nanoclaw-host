name: Review & Publish Tile

permissions:
  id-token: write
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Required by jbaruch/coding-policy/.github/actions/skill-review:
          # the action runs `git diff $BEFORE..HEAD` to find changed skills.
          # The action falls back to a depth-recovery fetch if needed, but
          # `fetch-depth: 0` keeps the path predictable.
          fetch-depth: 0

      - uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      # Reviews only the skills whose files changed in this push, against
      # jbaruch/coding-policy's rules. `credit-outage: skip` skips the affected
      # skill on a tessl out-of-credits (403) outage (flagged in the run summary
      # + the action's unreviewed-skills output); every other review failure
      # still hard-fails. De-vendored now that the native input exists
      # (jbaruch/coding-policy#188 / #190). The pinned action SHA is renewed via
      # .github/dependabot.yml (github-actions ecosystem).
      - name: Skill review (changed only)
        uses: jbaruch/coding-policy/.github/actions/skill-review@3e3f74e90f1ff6ae283fedc51a7191d1b628b543
        with:
          threshold: '85'
          credit-outage: 'skip'

      - name: Lint tile
        run: tessl tile lint .

      - uses: tesslio/patch-version-publish@v1
        with:
          token: ${{ secrets.TESSL_TOKEN }}
