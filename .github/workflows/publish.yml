name: Publish plugin

# Thin caller for the canonical fleet publish pipeline
# (jbaruch/coding-policy#206). All steps live in the reusable workflow;
# this file carries only the triggers and this repo's inputs.

on:
  push:
    branches:
      - main
  workflow_dispatch:

# The reusable workflow's own permissions are capped by what the caller
# grants — declare the publish pipeline's needs explicitly.
permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  publish:
    uses: jbaruch/coding-policy/.github/workflows/publish-plugin.yml@b7eb9d08b78f72810891aa5fe7bf3e4fa6eb55f6
    secrets: inherit
    with:
      # This repo opts into the tessl out-of-credits tolerance (default fail).
      skill-review-credit-outage: skip
